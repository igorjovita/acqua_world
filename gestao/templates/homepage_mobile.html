<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acqua World - Central</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f1f5f9; margin: 0; padding: 0; height: 100vh; overflow: hidden;
        }

        header {
            background: #091521; color: white; padding: 15px;
            position: fixed; top: 0; width: 100%; height: 60px;
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }

        main {
            position: absolute; top: 60px; bottom: 70px; width: 100%;
            overflow-y: auto; padding: 20px;
        }

        .card-hub {
            background: white; border-radius: 15px; padding: 20px;
            border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .field-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; }
        
        .modern-input {
            width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #e2e8f0;
            background: #f8fafc; font-size: 16px; color: #0f172a; outline: none;
        }

        .btn-gerar {
            width: 100%; background: #0ea5e9; color: white; border: none;
            padding: 16px; border-radius: 12px; font-size: 16px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); margin-top: 10px;
        }

        .tab-bar {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: white; border-top: 1px solid #e2e8f0;
            display: flex; justify-content: space-around; align-items: center;
        }
        .tab-item { text-decoration: none; color: #94a3b8; display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: 500; }
        .tab-item.active { color: #0ea5e9; }
    </style>
</head>
<body>

    <header>
        <span style="font-weight: bold; letter-spacing: 1px;">CENTRAL DE PLANILHAS</span>
    </header>

    <main>
        <div class="card-hub">
            <div class="field-group">
                <label>O que deseja gerar?</label>
                <select id="tipo_planilha" class="modern-input" onchange="toggleCampos()">
                    <option value="diaria">Planilha Diária (Embarque)</option>
                    <option value="caixa">Planilha de Caixa (Financeiro)</option>
                    <option value="comissao">Planilha de Comissões</option>
                </select>
            </div>

            <div id="box-data-unica" class="field-group">
                <label>Data</label>
                <input type="date" id="data_ref" class="modern-input" value="{{ filtros_atuais.data }}">
            </div>

            <div id="box-comissao" style="display: none;">
                <div class="field-group">
                    <label>Data Inicial</label>
                    <input type="date" id="data_inicio" class="modern-input" value="{{ filtros_atuais.data }}">
                </div>
                <div class="field-group">
                    <label>Data Final</label>
                    <input type="date" id="data_fim" class="modern-input" value="{{ filtros_atuais.data }}">
                </div>
                <div class="field-group">
                    <label>Vendedor</label>
                    <select id="vendedor_id" class="modern-input">
                        <option value="">Todos os Vendedores</option>
                        {% for v in vendedores %}
                        <option value="{{ v.id }}">{{ v.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="field-group">
                    <label>Situação</label>
                    <select id="situacao_pg" class="modern-input">
                        <option value="aberto">Em Aberto (Não Liquidado)</option>
                        <option value="liquidado">Liquidado (Pago)</option>
                    </select>
                </div>
            </div>

            <button type="button" class="btn-gerar" onclick="gerarRelatorio()">
                <span class="material-symbols-outlined">analytics</span>
                Gerar Planilha para Print
            </button>
        </div>
    </main>

    <nav class="tab-bar">
        <a href="{% url 'homepage' %}" class="tab-item active"> <span class="material-symbols-outlined">monitoring</span>Central
        </a>
        <a href="{% url 'sales' %}" class="tab-item">
            <span class="material-symbols-outlined" style="font-size: 35px; color: #0ea5e9;">add_circle</span>Novo
        </a>
        <a href="{% url 'pagamentos' %}" class="tab-item">
            <span class="material-symbols-outlined">payments</span>Pagamentos
        </a>
    </nav>

    <script>
        function toggleCampos() {
            const tipo = document.getElementById('tipo_planilha').value;
            const boxDataUnica = document.getElementById('box-data-unica');
            const boxComissao = document.getElementById('box-comissao');

            if (tipo === 'comissao') {
                boxDataUnica.style.display = 'none';
                boxComissao.style.display = 'block';
            } else {
                boxDataUnica.style.display = 'block';
                boxComissao.style.display = 'none';
            }
        }

        function gerarRelatorio() {
            const tipo = document.getElementById('tipo_planilha').value;
            let url = "";

            if (tipo === 'diaria') {
                const data = document.getElementById('data_ref').value;
                url = `{% url 'print_planilha' %}?data=${data}`;
            } 
            else if (tipo === 'caixa') {
                const data = document.getElementById('data_ref').value;
                // Ajuste a URL abaixo para a sua view de impressão do caixa
                url = `{% url 'print_caixa' %}?data=${data}`; 
            } 
            else if (tipo === 'comissao') {
                const inicio = document.getElementById('data_inicio').value;
                const fim = document.getElementById('data_fim').value;
                const vend = document.getElementById('vendedor_id').value;
                const status = document.getElementById('situacao_pg').value;
                url = `{% url 'print_comissoes' %}?vendedor=${vend}&inicio=${inicio}&fim=${fim}&status=${status}`;
            }

            if (url) window.open(url, '_blank');
        }
    </script>
</body>
</html>
